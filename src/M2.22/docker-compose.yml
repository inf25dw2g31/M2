services:
  db:
    image: mysql:8.0
    container_name: festivall_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: festivall
      MYSQL_USER: festivall_user
      MYSQL_PASSWORD: festivall1234
    ports:
      - "3307:3306"
    volumes:
      - festivall_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    container_name: festivall_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: festivall
      DB_USER: festivall_user
      DB_PASSWORD: festivall1234
      JWT_SECRET: festivall_jwt_secret_2024
      ENCRYPTION_SECRET: festivall_enc_secret_2024
      PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: festivall_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  festivall_data: