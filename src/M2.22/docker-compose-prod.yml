services:
  db:
    image: a046363/inf25dw2g31-m2-mysql:latest
    container_name: festivall_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: festivall
      MYSQL_USER: festivall_user
      MYSQL_PASSWORD: festivall1234
    ports:
      - "3307:3306"
    volumes:
      - festivall_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: a046363/inf25dw2g31-m2:latest
    container_name: festivall_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: festivall
      DB_USER: festivall_user
      DB_PASSWORD: festivall1234
      JWT_SECRET: festivall_jwt_secret_2024
      ENCRYPTION_SECRET: festivall_enc_secret_2024
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    image: a046363/inf25dw2g31-m2-react:latest
    container_name: festivall_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  festivall_data: